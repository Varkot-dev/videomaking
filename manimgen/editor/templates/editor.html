<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ManimGen Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #fff; }
    header span { color: #666; font-size: 12px; }

    .title-input {
      margin-left: auto;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      width: 220px;
    }
    .title-input:focus { outline: none; border-color: #6c63ff; }

    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-danger  { background: #e05252; color: #fff; }

    /* ── Export banner ── */
    #export-banner {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #0d1f14;
      border-bottom: 1px solid #1e4d2b;
      border-left: 4px solid #52c07a;
      flex-shrink: 0;
      font-size: 13px;
      color: #a3d9b1;
    }
    #export-banner.show { display: flex; }
    #export-banner .banner-icon { font-size: 15px; flex-shrink: 0; }
    #export-banner .banner-path { flex: 1; font-family: 'Consolas', 'Menlo', monospace; color: #7ecf97; }
    #export-banner .banner-dismiss {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
      flex-shrink: 0;
    }
    #export-banner .banner-dismiss:hover { color: #aaa; }

    /* ── Main layout ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Clip list (left panel) ── */
    #clip-list {
      width: 300px;
      background: #151515;
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      flex-shrink: 0;
    }

    #clip-list h2 {
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      border-bottom: 1px solid #2a2a2a;
    }

    .clip-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #1e1e1e;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .clip-item:hover { background: #1e1e1e; }
    .clip-item.active { background: #252535; border-left: 3px solid #6c63ff; }
    .clip-item.disabled { opacity: 0.35; }

    .clip-drag-handle {
      color: #444;
      cursor: grab;
      font-size: 16px;
      flex-shrink: 0;
    }
    .clip-drag-handle:active { cursor: grabbing; }

    .clip-info { flex: 1; min-width: 0; }
    .clip-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .clip-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge-fallback {
      font-size: 10px;
      background: #2a2a2a;
      color: #777;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
      font-weight: 400;
    }
    .clip-duration { font-size: 11px; color: #666; margin-top: 2px; }
    .clip-trim-badge {
      font-size: 10px;
      color: #6c63ff;
      margin-top: 2px;
    }

    .clip-toggle {
      background: none;
      border: 1px solid #3a3a3a;
      color: #aaa;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .clip-toggle:hover { border-color: #666; }
    .clip-item.disabled .clip-toggle { color: #555; }

    /* ── Preview + trim (right panel) ── */
    #preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #video-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #preview {
      width: 100%;
      height: 100%;
      display: none;
      object-fit: contain;
      outline: none;
    }

    #no-clip {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #444;
      font-size: 15px;
    }
    #no-clip.visible { display: block; }

    /* ── Trim panel ── */
    #trim-panel {
      background: #151515;
      border-top: 1px solid #2a2a2a;
      padding: 16px 20px;
      flex-shrink: 0;
    }

    #trim-panel h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 12px;
    }

    .trim-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .trim-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .trim-group label { font-size: 12px; color: #999; }
    .trim-group input[type=range] {
      width: 160px;
      accent-color: #6c63ff;
      cursor: pointer;
    }
    .trim-group .trim-val {
      font-size: 12px;
      color: #ccc;
      min-width: 44px;
    }

    .trim-apply {
      padding: 6px 14px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .trim-apply:hover { background: #333; }

    #trim-clip-name {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 10px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e1e2e;
      border: 1px solid #3a3a4a;
      color: #e0e0e0;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      z-index: 1000;
      max-width: 360px;
    }
    #toast.show { display: block; }
    #toast.error { border-color: #e05252; }
    #toast.success { border-color: #52c07a; }
  </style>
</head>
<body>

<header>
  <h1>ManimGen Editor</h1>
  <span id="clip-count">Loading...</span>
  <input class="title-input" id="title-input" type="text" placeholder="Output filename..." value="final_video" />
  <button class="btn btn-primary" id="export-btn" disabled>Export</button>
</header>

<div id="export-banner">
  <span class="banner-icon">&#10003;</span>
  <span class="banner-path" id="export-banner-path"></span>
  <button class="banner-dismiss" id="export-banner-dismiss" title="Dismiss">&times;</button>
</div>

<main>
  <div id="clip-list">
    <h2>Clips — drag to reorder</h2>
    <div id="clips-container"></div>
  </div>

  <div id="preview-panel">
    <div id="video-container">
      <video id="preview" controls></video>
      <div id="no-clip" class="visible">Select a clip to preview</div>
    </div>

    <div id="trim-panel">
      <div id="trim-clip-name">No clip selected</div>
      <h3>Trim</h3>
      <div class="trim-controls">
        <div class="trim-group">
          <label>In</label>
          <input type="range" id="trim-start" min="0" max="100" step="0.1" value="0" />
          <span class="trim-val" id="trim-start-val">0.0s</span>
        </div>
        <div class="trim-group">
          <label>Out</label>
          <input type="range" id="trim-end" min="0" max="100" step="0.1" value="0" />
          <span class="trim-val" id="trim-end-val">0.0s</span>
        </div>
        <button class="trim-apply" id="trim-apply-btn" disabled>Apply trim</button>
        <button class="trim-apply" id="trim-reset-btn" disabled>Reset</button>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let clips = [];          // [{id, filename, duration, trim_start, trim_end, enabled}]
  let activeIndex = null;  // index into clips[]
  let dragSrc = null;

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function loadClips() {
    const res = await fetch('/api/clips');
    const raw = await res.json();
    clips = raw.map(c => {
      const isFallback = c.id.toLowerCase().includes('fallback');
      return {
        ...c,
        trim_start: 0,
        trim_end: c.duration,
        enabled: !isFallback,
      };
    });
    render();
    document.getElementById('clip-count').textContent = `${clips.length} clip${clips.length !== 1 ? 's' : ''}`;
    updateExportBtn();
  }

  // ── Export button state ───────────────────────────────────────────────────
  function updateExportBtn() {
    const btn = document.getElementById('export-btn');
    const enabledCount = clips.filter(c => c.enabled).length;
    btn.textContent = `Export (${enabledCount} clip${enabledCount !== 1 ? 's' : ''})`;
    btn.disabled = enabledCount === 0;
  }

  // ── Render clip list ──────────────────────────────────────────────────────
  function render() {
    const container = document.getElementById('clips-container');
    container.innerHTML = '';
    clips.forEach((clip, i) => {
      const el = document.createElement('div');
      el.className = 'clip-item' +
        (i === activeIndex ? ' active' : '') +
        (!clip.enabled ? ' disabled' : '');
      el.draggable = true;
      el.dataset.index = i;

      const trimmed = clip.trim_start > 0 || clip.trim_end < clip.duration;
      const effectiveDur = (clip.trim_end - clip.trim_start).toFixed(1);
      const isFallback = clip.id.toLowerCase().includes('fallback');

      el.innerHTML = `
        <span class="clip-drag-handle">&#8991;</span>
        <div class="clip-info">
          <div class="clip-name-row">
            <div class="clip-name">${clip.id}</div>
            ${isFallback ? '<span class="badge-fallback">fallback</span>' : ''}
          </div>
          <div class="clip-duration">${clip.duration.toFixed(1)}s total</div>
          ${trimmed ? `<div class="clip-trim-badge">&#9986; trimmed to ${effectiveDur}s</div>` : ''}
        </div>
        <button class="clip-toggle">${clip.enabled ? 'Skip' : 'Include'}</button>
      `;

      // Click to select
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('clip-toggle')) return;
        selectClip(i);
      });

      // Toggle skip
      el.querySelector('.clip-toggle').addEventListener('click', () => {
        clips[i].enabled = !clips[i].enabled;
        render();
        updateExportBtn();
      });

      // Drag-and-drop reorder
      el.addEventListener('dragstart', (e) => {
        dragSrc = i;
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        el.style.borderTop = i !== dragSrc ? '2px solid #6c63ff' : '';
      });
      el.addEventListener('dragleave', () => { el.style.borderTop = ''; });
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        el.style.borderTop = '';
        if (dragSrc === null || dragSrc === i) return;
        const moved = clips.splice(dragSrc, 1)[0];
        clips.splice(i, 0, moved);
        if (activeIndex === dragSrc) activeIndex = i;
        else if (activeIndex !== null) {
          if (dragSrc < activeIndex && i >= activeIndex) activeIndex--;
          else if (dragSrc > activeIndex && i <= activeIndex) activeIndex++;
        }
        dragSrc = null;
        render();
        updateExportBtn();
      });

      container.appendChild(el);
    });
  }

  // ── Select clip ───────────────────────────────────────────────────────────
  function selectClip(i) {
    activeIndex = i;
    const clip = clips[i];
    const video = document.getElementById('preview');
    const noClip = document.getElementById('no-clip');

    video.style.display = 'block';
    noClip.classList.remove('visible');
    video.src = `/api/video/${clip.filename}`;
    video.load();
    video.addEventListener('loadedmetadata', () => {
      video.currentTime = clip.trim_start;
    }, { once: true });

    // Update trim panel
    document.getElementById('trim-clip-name').textContent = clip.id;
    const startSlider = document.getElementById('trim-start');
    const endSlider = document.getElementById('trim-end');
    startSlider.max = clip.duration;
    endSlider.max = clip.duration;
    startSlider.value = clip.trim_start;
    endSlider.value = clip.trim_end;
    updateTrimLabels();

    document.getElementById('trim-apply-btn').disabled = false;
    document.getElementById('trim-reset-btn').disabled = false;

    render();
  }

  // ── Trim sliders ──────────────────────────────────────────────────────────
  document.getElementById('trim-start').addEventListener('input', updateTrimLabels);
  document.getElementById('trim-end').addEventListener('input', updateTrimLabels);

  function updateTrimLabels() {
    const s = parseFloat(document.getElementById('trim-start').value);
    const e = parseFloat(document.getElementById('trim-end').value);
    document.getElementById('trim-start-val').textContent = s.toFixed(1) + 's';
    document.getElementById('trim-end-val').textContent = e.toFixed(1) + 's';

    // Preview: seek to trim start point (only when paused)
    const video = document.getElementById('preview');
    if (!video.paused) return;
    video.currentTime = s;
  }

  document.getElementById('trim-apply-btn').addEventListener('click', () => {
    if (activeIndex === null) return;
    const s = parseFloat(document.getElementById('trim-start').value);
    let e = parseFloat(document.getElementById('trim-end').value);
    if (e <= s) e = s + 0.1;
    clips[activeIndex].trim_start = s;
    clips[activeIndex].trim_end = e;
    render();
    showToast(`Trim applied: ${s.toFixed(1)}s \u2192 ${e.toFixed(1)}s`, 'success');
  });

  document.getElementById('trim-reset-btn').addEventListener('click', () => {
    if (activeIndex === null) return;
    const clip = clips[activeIndex];
    clip.trim_start = 0;
    clip.trim_end = clip.duration;
    document.getElementById('trim-start').value = 0;
    document.getElementById('trim-end').value = clip.duration;
    updateTrimLabels();
    render();
    showToast('Trim reset', 'success');
  });

  // ── Export ────────────────────────────────────────────────────────────────
  document.getElementById('export-btn').addEventListener('click', async () => {
    const enabled = clips.filter(c => c.enabled);
    if (!enabled.length) {
      showToast('No clips enabled \u2014 toggle some clips back on.', 'error');
      return;
    }

    const title = document.getElementById('title-input').value.trim() || 'final_video';
    const btn = document.getElementById('export-btn');
    btn.disabled = true;
    btn.textContent = 'Exporting...';
    showToast(`Exporting ${enabled.length} clip${enabled.length !== 1 ? 's' : ''}...`);

    try {
      const res = await fetch('/api/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title,
          clips: enabled.map(c => ({
            filename: c.filename,
            duration: c.duration,
            trim_start: c.trim_start,
            trim_end: c.trim_end,
          })),
        }),
      });

      const data = await res.json();
      if (!res.ok) {
        showToast(`Export failed: ${data.error}`, 'error');
      } else {
        showExportBanner(data.output);
        showToast('Export complete!', 'success');
        loadClips();
      }
    } catch (err) {
      showToast(`Export error: ${err.message}`, 'error');
    } finally {
      // Re-enable only if export failed; on success loadClips() will call updateExportBtn()
      // so we just restore the label here and let updateExportBtn set disabled correctly.
      const currentEnabled = clips.filter(c => c.enabled).length;
      btn.disabled = currentEnabled === 0;
      btn.textContent = `Export (${currentEnabled} clip${currentEnabled !== 1 ? 's' : ''})`;
    }
  });

  // ── Export banner ─────────────────────────────────────────────────────────
  function showExportBanner(outputPath) {
    const banner = document.getElementById('export-banner');
    document.getElementById('export-banner-path').textContent =
      '\u2713 Exported to: ' + outputPath;
    banner.classList.add('show');
  }

  document.getElementById('export-banner-dismiss').addEventListener('click', () => {
    document.getElementById('export-banner').classList.remove('show');
  });

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (type ? ` ${type}` : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 4000);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  loadClips();
</script>
</body>
</html>
