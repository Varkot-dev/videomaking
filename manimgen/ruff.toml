# Ruff config — strict for the shippable source package (manimgen/).
#
# Scope decision (ci/harden-checks): the gate covers manimgen/ source only.
# tests/ has ~27 unformatted files / ~208 lint issues that have never been
# linted; cleaning it now would collide with every open PR (they all touch
# test files). tests/ cleanup is tracked as separate follow-up work.
#
# Convention: `ruff format` owns formatting (incl. line length), so the
# linter does NOT also flag E501 — that would double-gate the same concern
# and fight the formatter. The linter owns logic/correctness (F), import
# order (I), and the non-line-length pycodestyle rules.

target-version = "py313"
line-length = 88

[lint]
# Logic + imports + pycodestyle, MINUS E501 (formatter's job).
select = ["E4", "E7", "E9", "W", "F", "I"]

# --- Documented legacy allowlist. Each entry is real tech debt, not a
# false positive. Shrink over time; do not grow. New code is still fully
# linted for every other rule. ---
[lint.per-file-ignores]
# E402: deliberate mid-module imports placed after helper defs to avoid a
# circular import. Restructuring is a separate refactor.
"manimgen/planner/lesson_planner.py" = ["E402", "W605"]
"manimgen/input/pdf_parser.py" = ["E402"]
# W605 (lesson_planner): the `\/` in _escape_bad_backslashes' valid-escape
# set. Intentionally untouched — that function guards the researcher-brief
# JSON path and is out of scope for unrelated cleanups.
# F841: dead local assignments — harmless cruft, scheduled cleanup. The
# retry.py one is left for the open director-prompt PR to resolve so this
# branch does not collide in that exact function.
"manimgen/validator/codeguard.py" = ["F841"]
"manimgen/validator/retry.py" = ["F841"]
# E741: a single ambiguous loop var `l`; trivial scoped cleanup pending.
"manimgen/validator/timing_verifier.py" = ["E741"]
